name: Build Nucleus Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar mod
        run: ./gradlew build

      - name: Subir jar
        uses: actions/upload-artifact@v4
        with:
          name: nucleus-1.0.0
          path: build/libs/nucleus-1.0.0.jar
          retention-days: 30
